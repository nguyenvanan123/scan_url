kind = "web"
previewPath = "/"
title = "Web Vulnerability Scanner"
version = "1.0.0"
id = "artifacts/vuln-scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19593

[services.development]
run = "pnpm --filter @workspace/vuln-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vuln-scanner", "run", "build" ]
publicDir = "artifacts/vuln-scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19593"
BASE_PATH = "/"
